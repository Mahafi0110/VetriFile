spring.application.name=demo
server.port=${PORT:10000}

# ── Database ────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ── Thymeleaf ────────────────────────────────────────
spring.thymeleaf.cache=false

# ── File Upload ──────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# ── File Storage ─────────────────────────────────────
app.upload.dir=uploads/temp

# ── JWT ──────────────────────────────────────────────
app.jwt.secret=vetrifiles_super_secret_jwt_key_2026_must_be_long
app.jwt.expiration=86400000

# ── Cookie / Session ─────────────────────────────────
# SameSite=None required for cross-site requests on Render
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true

# ── Render reverse proxy fix ─────────────────────────
# Tells Spring to trust X-Forwarded-Proto header from Render
server.forward-headers-strategy=framework

# ── Logging ──────────────────────────────────────────
logging.level.com.vetrifiles=DEBUG
logging.level.org.springframework.security=DEBUG
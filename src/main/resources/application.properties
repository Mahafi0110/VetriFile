 spring.application.name=demo
# ── App ──────────────────────────────────────
server.port=8080

# ── MySQL Database ───────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/vetrifiles_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Thymeleaf ────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.suffix=.html
spring.thymeleaf.prefix=classpath:/templates/

# ── File Upload ──────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB
server.tomcat.max-http-form-post-size=2GB
server.tomcat.max-swallow-size=2GB

# ── File Storage Path ────────────────────────
app.upload.dir=uploads/temp

# ── JWT ──────────────────────────────────────
app.jwt.secret=vetrifiles_super_secret_jwt_key_2026_must_be_long
app.jwt.expiration=86400000

# ── Logging ──────────────────────────────────
logging.level.com.vetrifiles=DEBUG
logging.level.org.springframework.security=DEBUG
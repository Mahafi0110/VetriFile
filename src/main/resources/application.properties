spring.application.name=demo

# Tell Render the correct port explicitly  
server.port=${PORT:8080}


# ─── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:/tmp/data/testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# ─── H2 connection pool (saves ~50MB RAM) ─────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ─── Thymeleaf ────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=true

# ─── File upload limits ───────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=52MB
# CRITICAL: stream straight to disk — 50MB upload uses ~0MB heap during HTTP phase
spring.servlet.multipart.file-size-threshold=0B
spring.servlet.multipart.location=/tmp/vetri-uploads

# ─── Tomcat ───────────────────────────────────────────────────────────────────
# Threads (saves ~50MB RAM on Render free tier)
server.tomcat.threads.max=10
server.tomcat.threads.min-spare=2
# Allow large uploads to be fully received even if we reject them later
server.tomcat.max-swallow-size=-1
# Controller returns 202 quickly, so 30s is enough for the HTTP phase
server.tomcat.connection-timeout=30000

# ─── Async task execution (file processing thread pool) ───────────────────────
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=20
spring.task.execution.thread-name-prefix=vetri-file-

# ─── File storage ─────────────────────────────────────────────────────────────
app.upload.dir=/tmp/uploads
app.output.dir=/tmp/outputs

# ─── App URL ──────────────────────────────────────────────────────────────────
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ─── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# ─── Cookie / Session ─────────────────────────────────────────────────────────
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

# ─── Render reverse proxy ─────────────────────────────────────────────────────
server.forward-headers-strategy=framework

# ─── Health check (keep-alive ping) ───────────────────────────────────────────
management.endpoints.web.exposure.include=health

# ─── Mail (port 465 SSL — port 587 is blocked on Render) ─────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.ssl.enable=true
# spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ─── Logging (reduced to save RAM) ────────────────────────────────────────────
logging.level.com.example.demo=INFO
logging.level.com.vetri=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web.multipart=WARN
logging.level.org.hibernate=WARN

# Give active requests more time to complete before shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=60s

# ─── Scheduled cleanup (uncomment + add @EnableScheduling to Application.java) ─
# spring.task.scheduling.pool.size=1
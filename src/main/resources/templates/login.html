<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Vetri Files</title>
  <script src="/js/auth.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --blue-dark: #1E3A8A;
      --blue: #3B82F6;
      --gray-bg: #F3F4F6;
      --border: #E5E7EB;
      --text: #1F2937;
      --sub: #4A5565;
      --red: #DC2626;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--gray-bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    nav {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--blue-dark), var(--blue));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon i {
      color: #fff;
      font-size: 1.1rem;
    }

    .brand-name {
      font-family: 'Poppins', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    .nav-btn {
      background: linear-gradient(135deg, var(--blue-dark), var(--blue));
      color: #fff;
      border: none;
      padding: 9px 22px;
      border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: .88rem;
      text-decoration: none;
      cursor: pointer;
    }

    /* Card */
    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 32px rgba(30, 58, 138, .08);
    }

    .card-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .card-logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--blue-dark), var(--blue));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-logo-icon i {
      color: #fff;
      font-size: 1.1rem;
    }

    .card-logo-name {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
    }

    h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: .88rem;
      color: var(--sub);
      margin-bottom: 28px;
    }

    /* Form */
    label {
      font-size: .83rem;
      font-weight: 600;
      color: var(--text);
      display: block;
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 16px;
    }

    .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: #9CA3AF;
      font-size: .95rem;
      pointer-events: none;
    }

    input[type=email],
    input[type=password],
    input[type=text] {
      width: 100%;
      padding: 12px 12px 12px 40px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: .9rem;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
      background: #fff;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .1);
    }

    input.err {
      border-color: var(--red);
    }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #9CA3AF;
      cursor: pointer;
      font-size: .95rem;
    }

    .eye-btn:hover {
      color: var(--blue);
    }

    .field-err {
      font-size: .76rem;
      color: var(--red);
      margin-top: -10px;
      margin-bottom: 12px;
      display: none;
    }

    .row-mid {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .83rem;
      color: var(--sub);
      cursor: pointer;
    }

    .remember input {
      accent-color: var(--blue);
      width: 15px;
      height: 15px;
    }

    .forgot {
      font-size: .83rem;
      font-weight: 600;
      color: var(--blue);
      text-decoration: none;
    }

    /* Button */
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--blue-dark), var(--blue));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 20px;
      transition: opacity .2s;
    }

    .btn-submit:hover {
      opacity: .9;
    }

    .btn-submit:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: .78rem;
      color: #9CA3AF;
    }

    /* Google */
    .btn-google {
      width: 100%;
      padding: 11px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: .88rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      transition: border-color .2s;
      margin-bottom: 16px;
    }

    .btn-google:hover {
      border-color: var(--blue);
    }

    /* Switch */
    .switch {
      text-align: center;
      font-size: .85rem;
      color: var(--sub);
    }

    .switch a {
      font-weight: 700;
      color: var(--blue);
      text-decoration: none;
    }

    /* Alerts */
    .alert {
      border-radius: 10px;
      padding: 11px 14px;
      font-size: .83rem;
      margin-bottom: 18px;
      display: none;
      align-items: center;
      gap: 9px;
    }

    .alert.show {
      display: flex;
    }

    .alert-err {
      background: #FEF2F2;
      border: 1.5px solid #FECACA;
      color: var(--red);
    }

    .alert-ok {
      background: #F0FDF4;
      border: 1.5px solid #BBF7D0;
      color: #16A34A;
    }

    @media(max-width:480px) {
      .card {
        padding: 28px 18px;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a class="brand" href="/login">
      <div class="brand-icon"><i class="bi bi-file-earmark-text-fill"></i></div>
      <span class="brand-name">Vetri Files</span>
    </a>
    <a href="/register" class="nav-btn">Get Started</a>
  </nav>

  <div class="page">
    <div class="card">

      <div class="card-logo">
        <div class="card-logo-icon"><i class="bi bi-file-earmark-text-fill"></i></div>
        <span class="card-logo-name">Vetri Files</span>
      </div>

      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account to continue</p>

      <div class="alert alert-err" id="errAlert">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span id="errMsg">Invalid email or password.</span>
      </div>
      <div class="alert alert-ok" id="okAlert">
        <i class="bi bi-check-circle-fill"></i>
        <span>Login successful! Redirecting...</span>
      </div>

      <form id="loginForm" novalidate>

        <label for="email">Email address</label>
        <div class="input-wrap">
          <i class="bi bi-envelope input-icon"></i>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <p class="field-err" id="emailErr">Please enter a valid email.</p>

        <label for="password">Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock input-icon"></i>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
          <button type="button" class="eye-btn" onclick="togglePw('password','eyeIcon')">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
        <p class="field-err" id="pwErr">Password is required.</p>

        <div class="row-mid">
          <label class="remember">
            <input type="checkbox" id="rememberMe" /> Remember me
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit" id="loginBtn">Sign In</button>
      </form>

      <div class="divider"><span>or continue with</span></div>

      <a href="https://www.google.com" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#FFC107"
            d="M43.6 20H24v8h11.3C33.8 33.6 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-8 20-20 0-1.3-.2-2.7-.4-4z" />
          <path fill="#FF3D00"
            d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4c-7.7 0-14.4 4.2-17.7 10.7z" />
          <path fill="#4CAF50"
            d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.5 26.9 36 24 36c-5.3 0-9.8-3.4-11.4-8.1l-6.5 5C9.5 39.6 16.2 44 24 44z" />
          <path fill="#1976D2"
            d="M43.6 20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.5l6.2 5.2C41 35.5 44 30.2 44 24c0-1.3-.2-2.7-.4-4z" />
        </svg>
        Continue with Google
      </a>

      <p class="switch">Don't have an account? <a href="/register">Sign up free</a></p>
    </div>
  </div>

  <script>
    function togglePw(inputId, iconId) {
      const inp = document.getElementById(inputId);
      const ico = document.getElementById(iconId);
      if (inp.type === 'password') { inp.type = 'text'; ico.className = 'bi bi-eye-slash'; }
      else { inp.type = 'password'; ico.className = 'bi bi-eye'; }
    }

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const emailEl = document.getElementById('email');
      const pwEl = document.getElementById('password');

      // Reset
      emailEl.classList.remove('err'); pwEl.classList.remove('err');
      document.getElementById('emailErr').style.display = 'none';
      document.getElementById('pwErr').style.display = 'none';
      document.getElementById('errAlert').classList.remove('show');
      document.getElementById('okAlert').classList.remove('show');

      // Validate
      let ok = true;
      if (!emailEl.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)) {
        emailEl.classList.add('err'); document.getElementById('emailErr').style.display = 'block'; ok = false;
      }
      if (!pwEl.value) {
        pwEl.classList.add('err'); document.getElementById('pwErr').style.display = 'block'; ok = false;
      }
      if (!ok) return;

      // Submit
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: emailEl.value.trim(),
            password: pwEl.value,
            rememberMe: document.getElementById('rememberMe').checked
          })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.message || 'Invalid email or password');

        // Save user info for navbar
        sessionStorage.setItem('vetri_user', JSON.stringify({
          name: data.data.firstName + ' ' + data.data.lastName,
          email: data.data.email
        }));

        document.getElementById('okAlert').classList.add('show');
        setTimeout(() => window.location.href = '/', 900);

      } catch (err) {
        btn.disabled = false; btn.innerHTML = 'Sign In';
        document.getElementById('errMsg').textContent = err.message;
        document.getElementById('errAlert').classList.add('show');
      }
    });

    ['email', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('input', function () {
        this.classList.remove('err');
        document.getElementById('errAlert').classList.remove('show');
      });
    });
  </script>
</body>

</html>
